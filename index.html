<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACHUCOBET | Semifinal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}
.wrap{max-width:900px;margin:auto;padding:20px}

h1{text-align:center}

.card{
  background:#101a33;
  border-radius:15px;
  padding:15px;
  margin:15px 0;
}

.opcion{
  display:block;
  margin:6px 0;
  padding:8px;
  border-radius:10px;
  border:1px solid #ffffff20;
  cursor:pointer;
}

.opcion:hover{background:#ffffff10}

.btn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn-wa{
  background:#25D366;
  color:#003300;
  width:100%;
}
</style>
</head>

<body>

<div class="wrap">

<h1>🏆 1ra Semifinal Copa Olivar 2026</h1>

<!-- PARTIDO 1 -->
<div class="card">
<h2>MILAGROS vs VERBENAS</h2>

<label class="opcion"><input type="radio" name="p1" value="LOCAL 1.50"> LOCAL 1.50</label>
<label class="opcion"><input type="radio" name="p1" value="EMPATE 1.60"> EMPATE 1.60</label>
<label class="opcion"><input type="radio" name="p1" value="VISITA 1.65"> VISITA 1.65</label>

<label class="opcion"><input type="radio" name="p1" value="LOCAL/EMPATE 1.35"> LOCAL/EMPATE 1.35</label>
<label class="opcion"><input type="radio" name="p1" value="VISITA/EMPATE 1.50"> VISITA/EMPATE 1.50</label>

<label class="opcion"><input type="radio" name="p1" value="GOLES >3.5 1.65"> GOLES > 3.5 (1.65)</label>
<label class="opcion"><input type="radio" name="p1" value="GOLES <3.5 1.65"> GOLES < 3.5 (1.65)</label>

<label class="opcion"><input type="radio" name="p1" value="TARJETAS >1.5 1.40"> TARJETAS > 1.5 (1.40)</label>
<label class="opcion"><input type="radio" name="p1" value="TARJETAS <1.5 1.65"> TARJETAS < 1.5 (1.65)</label>

<label class="opcion"><input type="radio" name="p1" value="LOCAL Y +3.5 GOLES 2.30"> LOCAL Y +3.5 GOLES (2.30)</label>
<label class="opcion"><input type="radio" name="p1" value="VISITA Y +3.5 GOLES 2.60"> VISITA Y +3.5 GOLES (2.60)</label>

<button class="btn btn-wa" onclick="enviar('p1','MILAGROS vs VERBENAS')">
Enviar a WhatsApp
</button>
</div>

<!-- PARTIDO 2 -->
<div class="card">
<h2>ENGREIDITOS vs POTRILLOS</h2>

<label class="opcion"><input type="radio" name="p2" value="LOCAL 1.60"> LOCAL 1.60</label>
<label class="opcion"><input type="radio" name="p2" value="EMPATE 1.55"> EMPATE 1.55</label>
<label class="opcion"><input type="radio" name="p2" value="VISITA 1.50"> VISITA 1.50</label>

<label class="opcion"><input type="radio" name="p2" value="LOCAL/EMPATE 1.50"> LOCAL/EMPATE 1.50</label>
<label class="opcion"><input type="radio" name="p2" value="VISITA/EMPATE 1.35"> VISITA/EMPATE 1.35</label>

<label class="opcion"><input type="radio" name="p2" value="GOLES >3.5 1.65"> GOLES > 3.5 (1.65)</label>
<label class="opcion"><input type="radio" name="p2" value="GOLES <3.5 1.65"> GOLES < 3.5 (1.65)</label>

<label class="opcion"><input type="radio" name="p2" value="TARJETAS >1.5 1.40"> TARJETAS > 1.5 (1.40)</label>
<label class="opcion"><input type="radio" name="p2" value="TARJETAS <1.5 1.65"> TARJETAS < 1.5 (1.65)</label>

<label class="opcion"><input type="radio" name="p2" value="LOCAL Y +3.5 GOLES 2.70"> LOCAL Y +3.5 GOLES (2.70)</label>
<label class="opcion"><input type="radio" name="p2" value="VISITA Y +3.5 GOLES 2.25"> VISITA Y +3.5 GOLES (2.25)</label>

<button class="btn btn-wa" onclick="enviar('p2','ENGREIDITOS vs POTRILLOS')">
Enviar a WhatsApp
</button>
</div>

</div>

<script>
const numero="51906962474";

function enviar(name, partido){
  const seleccion=document.querySelector(`input[name="${name}"]:checked`);
  if(!seleccion){
    alert("Selecciona una opción");
    return;
  }

  const mensaje=
`ACHUCOBET
1ra Semifinal Copa Olivar 2026

Partido:
${partido}

Apuesta:
${seleccion.value}`;

  const url=`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;
  window.open(url);
}
</script>

</body>
</html>
